<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>String Lights Editor</title>
<link rel="stylesheet" href="/static/editor.css">
</head>
<body>

<div id="toolbar">
  <label>Duration (s) <input type="number" id="seconds" value="10" min="0.25" max="600" step="0.25"></label>
  <label>File <input type="text" id="filename" value="clip1" placeholder="clip1"></label>
  <button id="export-btn">Export .npy</button>
  <button id="clear-btn">Clear</button>
  <span class="hint">left-click / drag = pluck &nbsp;|&nbsp; right-click = clear &nbsp;|&nbsp; drag playhead or click ruler = seek</span>
</div>

<div id="grid-wrap">
  <div id="labels"></div>
  <div id="grid-inner">
    <div id="playhead"></div>
    <div id="time-numbers" class="header-row time-row"></div>
    <div id="rows"></div>
  </div>
</div>

<div id="video-section">
  <video id="video" controls></video>
</div>

<script src="/static/editor.js"></script>
</body>
</html>
